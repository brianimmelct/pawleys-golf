<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pawleys 2026">
<meta name="theme-color" content="#1a3a2a">
<title>Pawleys Island 2026 Golf Trip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-light: #4a8c5c;
    --green-pale: #a8d4b0;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --white: #ffffff;
    --text-dark: #1a2520;
    --text-mid: #3d5247;
    --text-light: #6b8a74;
    --danger: #c0392b;
    --shadow: 0 4px 24px rgba(26,58,42,0.18);
    --shadow-sm: 0 2px 8px rgba(26,58,42,0.12);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--green-deep);
    color: var(--cream);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(74,140,92,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(201,168,76,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; }

  /* ── HEADER ── */
  .app-header {
    background: linear-gradient(180deg, rgba(13,28,20,0.98) 0%, rgba(26,58,42,0.95) 100%);
    padding: 52px 20px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .app-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }

  .app-header p {
    font-size: 12px;
    color: var(--green-pale);
    margin-top: 3px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .header-golf-icon {
    font-size: 28px;
    display: block;
    margin-bottom: 4px;
  }

  /* ── ADMIN BADGE ── */
  .admin-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--gold);
    color: var(--green-deep);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex: 1;
    min-width: 70px;
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .nav-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .nav-tab-icon { display: block; font-size: 16px; margin-bottom: 2px; }

  /* ── MAIN CONTENT ── */
  .main-content {
    padding: 20px 16px 100px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── CARDS ── */
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(8px);
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── ROUND CARD ── */
  .round-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
  }

  .round-header {
    background: linear-gradient(135deg, var(--green-mid), var(--green-deep));
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .round-number {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
  }

  .round-meta {
    text-align: right;
    font-size: 11px;
    color: var(--green-pale);
    line-height: 1.4;
  }

  .round-course {
    font-weight: 600;
    color: var(--cream);
    font-size: 13px;
  }

  .group-section {
    padding: 12px 16px;
  }

  .group-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    padding: 4px 10px;
    border-radius: 20px;
    display: inline-block;
  }

  .group-a .group-label { background: rgba(74,140,92,0.25); color: var(--green-pale); }
  .group-b .group-label { background: rgba(201,168,76,0.2); color: var(--gold-light); }

  .group-players {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }

  .player-score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.05);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--cream);
  }

  .player-score-val {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    min-width: 32px;
    text-align: right;
  }

  .player-score-val.empty { color: var(--text-light); font-size: 14px; }

  .group-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 0 16px;
  }

  /* ── LEADERBOARD ── */
  .leaderboard-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    gap: 12px;
    transition: background 0.15s;
  }
  .leaderboard-row:last-child { border-bottom: none; }

  .lb-rank {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    width: 30px;
    text-align: center;
    flex-shrink: 0;
  }
  .lb-rank.r1 { color: var(--gold); }
  .lb-rank.r2 { color: #b0b8c1; }
  .lb-rank.r3 { color: #cd7f32; }
  .lb-rank.rn { color: var(--text-light); font-size: 15px; }

  .lb-name {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: var(--cream);
  }

  .lb-scores {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .lb-score-pill {
    font-size: 11px;
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 2px 7px;
    color: var(--green-pale);
    font-weight: 500;
  }

  .lb-total {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    min-width: 48px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── PAIRING MATRIX ── */
  .matrix-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    min-width: 280px;
  }

  .matrix-table th {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    padding: 8px 4px;
    text-align: center;
    font-weight: 700;
    font-size: 10px;
  }

  .matrix-table td {
    padding: 6px 4px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
    font-weight: 600;
    font-size: 13px;
  }

  .matrix-table .cell-self { background: rgba(255,255,255,0.03); color: var(--text-light); }
  .matrix-table .cell-1 { background: rgba(201,168,76,0.1); color: var(--gold-light); }
  .matrix-table .cell-2 { background: rgba(74,140,92,0.2); color: var(--green-pale); }
  .matrix-table .cell-3 { background: rgba(74,140,92,0.4); color: #7fffa0; }

  /* ── ADMIN FORMS ── */
  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--green-pale);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--cream);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }

  .form-input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.12);
  }

  .form-input::placeholder { color: var(--text-light); }

  .form-input.score-input {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    padding: 10px;
  }

  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .score-player-label {
    font-size: 11px;
    color: var(--green-pale);
    margin-bottom: 4px;
    font-weight: 600;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    -webkit-appearance: none;
    letter-spacing: 0.3px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--gold);
    color: var(--green-deep);
    width: 100%;
  }
  .btn-primary:hover { background: var(--gold-light); }

  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,0.2);
    width: 100%;
    margin-top: 8px;
  }

  .btn-danger {
    background: rgba(192,57,43,0.2);
    color: #e74c3c;
    border: 1px solid rgba(192,57,43,0.3);
    width: 100%;
    margin-top: 8px;
  }

  .btn-sm {
    padding: 8px 16px;
    font-size: 12px;
    width: auto;
  }

  /* ── LOGIN SCREEN ── */
  .login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .login-logo {
    font-size: 64px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 13px;
    color: var(--green-pale);
    margin-bottom: 40px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .login-box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 16px;
  }

  .login-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--cream);
    margin-bottom: 20px;
    font-weight: 700;
  }

  .guest-btn {
    color: var(--green-pale);
    font-size: 14px;
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    padding: 8px;
  }

  /* ── TOGGLE ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .toggle-label { font-size: 14px; font-weight: 500; color: var(--cream); }
  .toggle-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }

  .toggle {
    position: relative;
    width: 48px;
    height: 28px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
  }

  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }

  .toggle input:checked + .toggle-slider { background: var(--green-light); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

  /* ── STATUS MESSAGES ── */
  .status-msg {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
    display: none;
  }
  .status-msg.show { display: block; }
  .status-msg.success { background: rgba(74,140,92,0.25); color: var(--green-pale); border: 1px solid rgba(74,140,92,0.3); }
  .status-msg.error { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--green-pale);
    gap: 16px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SECTION HEADING ── */
  .section-heading {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-light);
    margin: 24px 0 12px;
  }

  /* ── ROUND ACTIVE / INACTIVE ── */
  .round-inactive { opacity: 0.4; }

  /* ── INSTALL HINT ── */
  .install-hint {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 12px;
    color: var(--gold-light);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .install-hint strong { display: block; margin-bottom: 4px; font-size: 13px; }

  /* ── NAMES GRID ── */
  .names-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .name-item { display: flex; flex-direction: column; gap: 4px; }
  .name-num {
    font-size: 10px;
    color: var(--gold);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── ERROR ── */
  .error-text { color: #e74c3c; font-size: 13px; text-align: center; padding: 20px; }

  /* ── MISC ── */
  .text-center { text-align: center; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 16px 0; }
  .small-note { font-size: 11px; color: var(--text-light); margin-top: 8px; }

  /* ── OFFLINE BADGE ── */
  .offline-banner {
    background: rgba(192,57,43,0.8);
    color: white;
    text-align: center;
    padding: 6px;
    font-size: 12px;
    font-weight: 600;
    display: none;
  }
  .offline-banner.show { display: block; }

  /* ── STAT PILLS on schedule view ── */
  .player-stats {
    display: flex;
    gap: 5px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .stat-pill {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .stat-pill.oneputt { background: rgba(74,140,92,0.25);  color: #7fffa0; }
  .stat-pill.threeputt { background: rgba(192,57,43,0.2); color: #ff8a80; }
  .stat-pill.chips  { background: rgba(201,168,76,0.2);   color: var(--gold-light); }
  .stat-pill.water  { background: rgba(41,128,185,0.2);   color: #7ec8e3; }

  /* ── STAT ENTRY GRID ── */
  .stat-entry-block {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 10px;
  }
  .stat-player-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding-bottom: 8px;
  }
  .stat-row-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 6px;
  }
  .stat-col label {
    display: block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
    text-align: center;
  }
  .stat-col.score-col label    { color: var(--gold); }
  .stat-col.oneputt-col label  { color: #7fffa0; }
  .stat-col.threeputt-col label { color: #ff8a80; }
  .stat-col.chips-col label    { color: var(--gold-light); }
  .stat-col.water-col label    { color: #7ec8e3; }
  .stat-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 8px 4px;
    color: var(--cream);
    font-size: 16px;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    text-align: center;
    outline: none;
    -webkit-appearance: none;
  }
  .stat-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.13); }
  .stat-col.score-col .stat-input     { color: var(--gold); }
  .stat-col.oneputt-col .stat-input   { color: #7fffa0; }
  .stat-col.threeputt-col .stat-input { color: #ff8a80; }
  .stat-col.chips-col .stat-input     { color: var(--gold-light); }
  .stat-col.water-col .stat-input     { color: #7ec8e3; }

  /* ── LB STAT SUMMARY ── */
  .lb-stat-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .lb-stat-chip {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .lb-stat-chip.oneputt   { background: rgba(74,140,92,0.25);  color: #7fffa0; }
  .lb-stat-chip.threeputt { background: rgba(192,57,43,0.2);   color: #ff8a80; }
  .lb-stat-chip.chips     { background: rgba(201,168,76,0.2);   color: var(--gold-light); }
  .lb-stat-chip.water     { background: rgba(41,128,185,0.2);  color: #7ec8e3; }

  /* ── STAT LEADERBOARD CARDS ── */
  .stat-lb-section { margin-top: 8px; }
  .stat-lb-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }

// ── SCHEDULE TAB ─────────────────────────────────────────────────────────────
function buildScheduleTab() {

    const course = d.courses[i] || {};

    const dateStr = course.date ? formatDate(course.date) : '';
    const teeStr = course.teeTime || '';
    const meta = [dateStr, teeStr].filter(Boolean).join(' · ');

    html += `<div class="round-card">
      <div class="round-header">
        <span class="round-number">Round ${i+1}</span>
        <div class="round-meta">
          <div class="round-course">${courseName}</div>
          ${meta ? `<div>${meta}</div>` : ''}
        </div>
      </div>`;

    const buildGroupHtml = (players, groupClass, groupLabel) => {
      let gh = `<div class="group-section ${groupClass}">
        <span class="group-label">${groupLabel}</span>
        <div class="group-players">`;
      players.forEach(p => {
        const name = d.players[p-1] || `Player ${p}`;
        const score    = d.scores[`r${i+1}_${p}`];
        const oneputt  = d.oneputt?.[`r${i+1}_${p}`];
        const threeputt= d.threeputt?.[`r${i+1}_${p}`];
        const chips    = d.chips?.[`r${i+1}_${p}`];
        const water    = d.water?.[`r${i+1}_${p}`];
        const hasStats = oneputt != null || threeputt != null || chips != null || water != null;
        gh += `<div class="player-score-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
          <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
            <span>${name}</span>
            <span class="player-score-val ${score==null?'empty':''}">${score!=null ? score : '—'}</span>

          gh += `<div class="player-stats">`;
          if (oneputt   != null) gh += `<span class="stat-pill oneputt">⛳ ${oneputt} 1-putt</span>`;

  return html;
}

// ── LEADERBOARD TAB ──────────────────────────────────────────────────────────
function buildLeaderboardTab() {
  const d = state.data;
  const schedule = d.numRounds === 5 ? SCHEDULE_5 : SCHEDULE_6;

  // Build player totals
  let players = d.players.map((name, idx) => {
    const p = idx + 1;
    let totalScore = 0, totalOneputt = 0, totalThreeputt = 0, totalChips = 0, totalWater = 0;
    let scoreCount = 0, oneputtCount = 0, threeputtCount = 0, chipsCount = 0, waterCount = 0;
    const rndScores = [];
    for (let r = 0; r < d.numRounds; r++) {
      const key = `r${r+1}_${p}`;
      const s  = d.scores[key];
      const op = d.oneputt?.[key];
      const tp = d.threeputt?.[key];
      const ch = d.chips?.[key];
      const wa = d.water?.[key];
      rndScores.push(s != null ? s : null);
      if (s  != null) { totalScore     += Number(s);  scoreCount++; }
      if (op != null) { totalOneputt   += Number(op); oneputtCount++; }
      if (tp != null) { totalThreeputt += Number(tp); threeputtCount++; }
      if (ch != null) { totalChips     += Number(ch); chipsCount++; }
      if (wa != null) { totalWater     += Number(wa); waterCount++; }
    }
    return { name, p, totalScore, totalOneputt, totalThreeputt, totalChips, totalWater,
             scoreCount, oneputtCount, threeputtCount, chipsCount, waterCount, rndScores };
  });

  const scorers = players.filter(p => p.scoreCount > 0).sort((a,b) => a.totalScore - b.totalScore);

  let html = `<p class="section-heading">Standings</p>`;

  if (scorers.length === 0) {
    html += `<div class="card"><p style="color:var(--green-pale);text-align:center;font-size:14px;">No scores yet — check back after Round 1!</p></div>`;
  } else {
    html += `<div class="card" style="padding:0;">`;
    scorers.forEach((p, i) => {
      const rankLabel = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
      const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      const pills = p.rndScores.map((s,ri) => s!=null ? `<span class="lb-score-pill">R${ri+1}: ${s}</span>` : '').join('');
      const statChips = [
        p.oneputtCount   > 0 ? `<span class="lb-stat-chip oneputt">⛳ ${p.totalOneputt} 1-putt</span>`     : '',
        p.threeputtCount > 0 ? `<span class="lb-stat-chip threeputt">😬 ${p.totalThreeputt} 3-putt</span>` : '',
        p.chipsCount     > 0 ? `<span class="lb-stat-chip chips">🏌️ ${p.totalChips} chips</span>`          : '',
        p.waterCount     > 0 ? `<span class="lb-stat-chip water">💧 ${p.totalWater} water</span>`           : '',
      ].filter(Boolean).join('');
      html += `<div class="leaderboard-row">
        <div class="lb-rank ${rankClass}">${rankLabel}</div>
        <div style="flex:1;min-width:0;">
          <div class="lb-name">${p.name}</div>
          <div class="lb-scores">${pills}</div>
          ${statChips ? `<div class="lb-stat-row">${statChips}</div>` : ''}
        </div>
        <div class="lb-total">${p.totalScore}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Stat sub-leaderboards
  const withOneputt   = players.filter(p=>p.oneputtCount>0).sort((a,b)=>b.totalOneputt-a.totalOneputt);
  const withThreeputt = players.filter(p=>p.threeputtCount>0).sort((a,b)=>b.totalThreeputt-a.totalThreeputt);
  const withChips     = players.filter(p=>p.chipsCount>0).sort((a,b)=>b.totalChips-a.totalChips);
  const withWater     = players.filter(p=>p.waterCount>0).sort((a,b)=>b.totalWater-a.totalWater);

  if (withOneputt.length > 0) {
    html += `<p class="section-heading">⛳ Most 1-Putts</p><div class="card" style="padding:0;">`;
    withOneputt.forEach((p,i) => {
      html += `<div class="stat-lb-row">
        <span style="color:var(--text-light);font-size:13px;min-width:22px;">${i+1}</span>
        <span class="stat-lb-name">${p.name}</span>
        <span class="stat-lb-val oneputt">${p.totalOneputt}</span>
      </div>`;
    });
    html += `</div>`;
  }

  if (withThreeputt.length > 0) {
    html += `<p class="section-heading">😬 Most 3-Putts</p><div class="card" style="padding:0;">`;
    withThreeputt.forEach((p,i) => {
      html += `<div class="stat-lb-row">
        <span style="color:var(--text-light);font-size:13px;min-width:22px;">${i+1}</span>
        <span class="stat-lb-name">${p.name}</span>
        <span class="stat-lb-val threeputt">${p.totalThreeputt}</span>
      </div>`;
    });
    html += `</div>`;
  }

  if (withChips.length > 0) {
    html += `<p class="section-heading">🏌️ Most Chips</p><div class="card" style="padding:0;">`;
    withChips.forEach((p,i) => {
      html += `<div class="stat-lb-row">
        <span style="color:var(--text-light);font-size:13px;min-width:22px;">${i+1}</span>
        <span class="stat-lb-name">${p.name}</span>
        <span class="stat-lb-val chips">${p.totalChips}</span>
      </div>`;
    });
    html += `</div>`;
  }

  if (withWater.length > 0) {
    html += `<p class="section-heading">💧 Most Water Balls</p><div class="card" style="padding:0;">`;
    withWater.forEach((p,i) => {
      html += `<div class="stat-lb-row">
        <span style="color:var(--text-light);font-size:13px;min-width:22px;">${i+1}</span>
        <span class="stat-lb-name">${p.name}</span>
        <span class="stat-lb-val water">${p.totalWater}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // Players with no scores yet
  const noScore = players.filter(p => p.scoreCount === 0);
  if (noScore.length > 0) {
    html += `<p class="section-heading">Yet to Play</p>
      <div class="card">
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${noScore.map(p=>`<span style="background:rgba(255,255,255,0.07);padding:6px 12px;border-radius:20px;font-size:13px;">${p.name}</span>`).join('')}
        </div>
      </div>`;
  }

  return html;
}

// ── PAIRING MATRIX TAB ───────────────────────────────────────────────────────
function buildMatrixTab() {
  const d = state.data;
  const schedule = d.numRounds === 5 ? SCHEDULE_5 : SCHEDULE_6;
  const rounds = schedule.slice(0, d.numRounds);
  const n = 8;

  // Build pair counts
  const pc = {};
  for (let i=1;i<=n;i++) for (let j=i+1;j<=n;j++) pc[`${i}_${j}`] = 0;
  rounds.forEach(rnd => {
    [rnd.groupA, rnd.groupB].forEach(grp => {
      for (let i=0;i<grp.length;i++) for (let j=i+1;j<grp.length;j++) {
        const k = `${Math.min(grp[i],grp[j])}_${Math.max(grp[i],grp[j])}`;
        pc[k]++;
      }
    });
  });

  const shortNames = d.players.map(n => n.split(' ')[0].slice(0,6));

  let html = `<p class="section-heading">Times Each Pair Plays Together</p>
    <div class="card">
      <div class="matrix-wrap">
        <table class="matrix-table">
          <tr><th></th>${shortNames.map(n=>`<th>${n}</th>`).join('')}</tr>`;

  for (let i=1;i<=n;i++) {
    html += `<tr><th>${shortNames[i-1]}</th>`;
    for (let j=1;j<=n;j++) {
      if (i===j) { html += `<td class="cell-self">—</td>`; continue; }
      const k = `${Math.min(i,j)}_${Math.max(i,j)}`;
      const v = pc[k];
      html += `<td class="cell-${v}">${v}</td>`;
    }
    html += `</tr>`;
  }

  html += `</table></div>
    <p class="small-note" style="margin-top:12px;">🟡 1 round  🟢 2 rounds  🟩 3 rounds</p>
    </div>`;

  return html;
}

      <button class="btn btn-primary mt-16" onclick="savePlayers()">Save Player Names</button>
    </div>

    <p class="section-heading">Course Details</p>`;

  for (let i=0; i<d.numRounds; i++) {
    const c = d.courses[i] || {};
    html += `<div class="card">
      <div class="card-title">Round ${i+1}</div>
      <div class="form-group">
        <label class="form-label">Course Name</label>
        <input type="text" class="form-input" id="course_name_${i}" value="${escHtml(c.name||'')}" placeholder="e.g. Caledonia Golf & Fish Club">
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="course_date_${i}" value="${c.date||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Tee Time</label>
        <input type="time" class="form-input" id="course_tee_${i}" value="${c.teeTime||''}">
      </div>
      <button class="btn btn-secondary btn-sm" onclick="saveCourse(${i})">Save Round ${i+1}</button>
    </div>`;
  }

  html += `
    <p class="section-heading">Admin</p>
    <div class="card">
      <button class="btn btn-danger" onclick="doLogout()">Sign Out of Admin</button>
    </div>`;

  return html;
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  state.currentTab = tab;
  renderApp();
};

window.doAdminLogin = function() {
  const pw = document.getElementById('pw-input')?.value;
  const err = document.getElementById('login-error');
  if (pw === ADMIN_PASSWORD) {
    state.isAdmin = true;
    state.isLoggedIn = true;
    sessionStorage.setItem('golf_admin', '1');
    render();
  } else {
    if (err) {
      err.textContent = 'Incorrect password. Try again.';
      err.classList.add('show');
    }
  }
};

window.doGuestLogin = function() {
  state.isAdmin = false;
  state.isLoggedIn = true;
  render();
};

window.doLogout = function() {
  state.isAdmin = false;
  sessionStorage.removeItem('golf_admin');
  render();
};

window.toggleRounds = async function(is6) {
  const newNum = is6 ? 6 : 5;
  state.data.numRounds = newNum;
  await saveToFirebase();
  showAdminStatus(`Switched to ${newNum} rounds ✓`, 'success');
  renderApp();
};

window.savePlayers = async function() {
  const names = state.data.players.map((_,i) => {
    const el = document.getElementById(`player_${i}`);
    return el ? el.value.trim() || `Player ${i+1}` : `Player ${i+1}`;
  });
  state.data.players = names;
  await saveToFirebase();
  showAdminStatus('Player names saved ✓', 'success');
};

window.saveCourse = async function(i) {
  const name = document.getElementById(`course_name_${i}`)?.value.trim() || '';
  const date = document.getElementById(`course_date_${i}`)?.value || '';
  const teeTime = document.getElementById(`course_tee_${i}`)?.value || '';
  state.data.courses[i] = { name, date, teeTime };
  await saveToFirebase();
  showAdminStatus(`Round ${i+1} saved ✓`, 'success');
};

window.saveStat = async function(round, player, statType, value) {
  const key = `r${round}_${player}`;
  const num = value === '' ? null : parseInt(value);

  if (!state.data.oneputt)   state.data.oneputt   = {};
  if (!state.data.threeputt) state.data.threeputt = {};
  if (!state.data.chips)     state.data.chips     = {};
  if (!state.data.water)     state.data.water     = {};

  const store = statType === 'score'     ? state.data.scores
              : statType === 'oneputt'   ? state.data.oneputt
              : statType === 'threeputt' ? state.data.threeputt
              : statType === 'chips'     ? state.data.chips
              :                            state.data.water;

  if (num === null) { delete store[key]; }
  else              { store[key] = num;  }

  await saveToFirebase();
  const el = document.getElementById('save-status');
  if (el) {
    el.textContent = 'Saved ✓';
    el.className = 'status-msg success show';
    setTimeout(() => el.classList.remove('show'), 2000);
  }
};

// ── FIREBASE OPS ─────────────────────────────────────────────────────────────
async function loadFromFirebase() {
  try {
    const ref = doc(db, 'tripData', 'main');
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const fetched = snap.data();
      while ((fetched.courses||[]).length < 6) {
        fetched.courses.push({ name:'', date:'', teeTime:'' });
      }
      if (!fetched.oneputt)   fetched.oneputt   = {};
      if (!fetched.threeputt) fetched.threeputt = {};
      if (!fetched.chips)     fetched.chips     = {};
      if (!fetched.water)     fetched.water     = {};
      state.data = { ...defaultData(), ...fetched };
    } else {
      state.data = defaultData();
      await setDoc(ref, state.data);
    }
  } catch(e) {
    console.error("Load error:", e);
    state.data = defaultData();
  }
}

async function saveToFirebase() {
  try {
    const ref = doc(db, 'tripData', 'main');
    await setDoc(ref, state.data);
  } catch(e) {
    console.error("Save error:", e);
    showAdminStatus('Save failed — check connection', 'error');
  }
}

function subscribeToUpdates() {
  if (unsubscribe) unsubscribe();
  const ref = doc(db, 'tripData', 'main');
  unsubscribe = onSnapshot(ref, snap => {
    if (snap.exists() && state.isLoggedIn) {
      const fetched = snap.data();
      while ((fetched.courses||[]).length < 6) {
        fetched.courses.push({ name:'', date:'', teeTime:'' });
      }
      if (!fetched.oneputt)   fetched.oneputt   = {};
      if (!fetched.threeputt) fetched.threeputt = {};
      if (!fetched.chips)     fetched.chips     = {};
      if (!fetched.water)     fetched.water     = {};
      state.data = { ...defaultData(), ...fetched };
      if (state.currentTab !== 'admin') renderApp();
    }
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  } catch { return dateStr; }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showAdminStatus(msg, type) {
  const el = document.getElementById('admin-status');
  if (el) {
    el.textContent = msg;
    el.className = `status-msg ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }
}

// ── ONLINE/OFFLINE ───────────────────────────────────────────────────────────
window.addEventListener('online', () => { state.isOnline = true; renderApp(); });
window.addEventListener('offline', () => { state.isOnline = false; renderApp(); });

// ── BOOT ─────────────────────────────────────────────────────────────────────
async function boot() {
  // Check admin session
  if (sessionStorage.getItem('golf_admin') === '1') {
    state.isAdmin = true;
    state.isLoggedIn = true;
  }

  render(); // show loading

  await loadFromFirebase();
  state.loading = false;
  render();

  if (state.isLoggedIn) subscribeToUpdates();
}

boot();

// Start live sync after login
const origGuestLogin = window.doGuestLogin;
window.doGuestLogin = function() {
  origGuestLogin();
  subscribeToUpdates();
};
</script>
</body>
</html>
